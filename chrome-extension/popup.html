<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lead Gen Platform</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .container {
      background: white;
      min-height: 400px;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px;
      text-align: center;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.9;
    }

    .content {
      padding: 24px;
    }

    .status {
      background: #f3f4f6;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status.connected {
      background: #d1fae5;
      color: #065f46;
    }

    .status.disconnected {
      background: #fee2e2;
      color: #991b1b;
    }

    .status-icon {
      font-size: 24px;
    }

    .status-text {
      flex: 1;
    }

    .status-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .status-subtitle {
      font-size: 12px;
      opacity: 0.8;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: white;
      color: #374151;
      border: 1px solid #d1d5db;
    }

    .btn-secondary:hover {
      background: #f9fafb;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .stat {
      background: #f9fafb;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: #6b7280;
    }

    .link {
      display: block;
      text-align: center;
      color: #667eea;
      text-decoration: none;
      font-size: 13px;
      margin-top: 16px;
    }

    .link:hover {
      text-decoration: underline;
    }

    .hidden {
      display: none;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🎯</div>
      <h1>Lead Gen Platform</h1>
      <p class="subtitle">LinkedIn Prospecting Extension</p>
    </div>

    <div class="content">
      <!-- Login View -->
      <div id="login-view">
        <div class="status disconnected">
          <span class="status-icon">⚠️</span>
          <div class="status-text">
            <div class="status-title">Not Connected</div>
            <div class="status-subtitle">Sign in to start prospecting</div>
          </div>
        </div>

        <div id="error-message" class="error hidden"></div>

        <form id="login-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="your@email.com" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn btn-primary">
            Sign In
          </button>
        </form>

        <a href="#" class="link">Don't have an account? Sign up</a>
      </div>

      <!-- Connected View -->
      <div id="connected-view" class="hidden">
        <div class="status connected">
          <span class="status-icon">✅</span>
          <div class="status-text">
            <div class="status-title">Connected</div>
            <div class="status-subtitle" id="user-email"></div>
          </div>
        </div>

        <div class="stats">
          <div class="stat">
            <div class="stat-value" id="prospects-count">0</div>
            <div class="stat-label">Prospects</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="sequences-count">0</div>
            <div class="stat-label">Sequences</div>
          </div>
        </div>

        <div style="margin-top: 20px;">
          <button class="btn btn-primary" id="open-dashboard">
            📊 Open Dashboard
          </button>
          <button class="btn btn-secondary" id="sync-button">
            🔄 Sync Data
          </button>
          <button class="btn btn-secondary" id="logout-button">
            🚪 Sign Out
          </button>
        </div>

        <a href="#" class="link">View extension settings</a>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
